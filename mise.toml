[tools]
go = "1.25.1"

# ── Build ──────────────────────────────────────────────────────────────────────

[tasks.build]
description = "Compile the API binary to ./bin/goingcrypt-api"
run = "go build -o ./bin/goingcrypt-api ./cmd/api/main.go"

[tasks.dev]
description = "Run the API locally with hot reload (requires air: go install github.com/air-verse/air@latest)"
run = "air -c .air.toml"

# ── Quality ────────────────────────────────────────────────────────────────────

[tasks.fmt]
description = "Format all Go source files"
run = "gofmt -w ."

[tasks.vet]
description = "Run go vet on all packages"
run = "go vet ./..."

[tasks.lint]
description = "Run golangci-lint on all packages"
run = "golangci-lint run ./..."

[tasks.tidy]
description = "Tidy go.mod and go.sum"
run = "go mod tidy"

# ── Test ───────────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.test-v]
description = "Run all tests with verbose output"
run = "go test -v ./..."

[tasks.test-cover]
description = "Run tests with coverage and open HTML report"
run = "go test -coverprofile=temp/coverage.out ./... && go tool cover -html=temp/coverage.out -o temp/coverage.html"

# ── Database ───────────────────────────────────────────────────────────────────

[tasks.migrate-up]
description = "Apply all pending migrations"
run = "go run ./cmd/migrate/main.go -direction=up"

[tasks.migrate-down]
description = "Rollback migrations — append: -- -steps=1 (default: all)"
run = "go run ./cmd/migrate/main.go -direction=down"

[tasks.migrate-create]
description = "Create a new migration pair — append: -- <migration_name>"
run = "migrate create -seq -ext sql -dir ./cmd/migrate/migrations"

# ── Docker ─────────────────────────────────────────────────────────────────────

[tasks.docker-up]
description = "Start all services with hot reload (dev mode via docker-compose.override.yml)"
run = "docker compose up"

[tasks.docker-up-prod]
description = "Start all services in production mode (override ignored)"
run = "docker compose -f docker-compose.yml up"

[tasks.docker-build]
description = "Build Docker images injecting git version metadata"
run = """
docker compose build \
  --build-arg VERSION=$(git describe --tags --always 2>/dev/null || echo dev) \
  --build-arg COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown) \
  --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
"""